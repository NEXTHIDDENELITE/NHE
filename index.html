<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATC TOPUP | Buy Mobile Recharge & Game Credits</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        .service-card:hover { transform: translateY(-5px); transition: 0.3s; }
    </style>
</head>
<body class="bg-gray-50">

    <header class="gradient-bg text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-white text-blue-600 p-1 rounded font-bold text-xl">ATC</div>
                <span class="text-xl font-bold tracking-tight">TOPUP</span>
            </div>
            <nav class="hidden md:flex space-x-6 font-medium">
                <a href="#" class="hover:text-blue-200">Home</a>
                <a href="#" class="hover:text-blue-200">Drive Pack</a>
                <a href="#" class="hover:text-blue-200">History</a>
                <a href="#" class="hover:text-blue-200">Wallet</a>
            </nav>
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-bell cursor-pointer"></i>
                <div class="w-8 h-8 bg-blue-400 rounded-full flex items-center justify-center">
                    <i class="fa-solid fa-user text-sm"></i>
                </div>
            </div>
        </div>
    </header>

    <section class="gradient-bg text-white pb-20 pt-10 px-4 rounded-b-[40px]">
        <div class="container mx-auto text-center">
            <p class="text-blue-100 text-sm mb-1">Current Balance</p>
            <h2 class="text-4xl font-bold mb-6">৳ 2,450.00</h2>
            <div class="flex justify-center space-x-4">
                <button class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold shadow-lg">Add Money</button>
                <button class="bg-blue-500 border border-blue-300 px-6 py-2 rounded-full font-bold">My Profile</button>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-4 -mt-10">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center service-card border border-gray-100">
                <div class="text-blue-600 text-3xl mb-2"><i class="fa-solid fa-mobile-screen"></i></div>
                <p class="font-semibold text-gray-700">Recharge</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center service-card border border-gray-100">
                <div class="text-orange-500 text-3xl mb-2"><i class="fa-solid fa-bolt"></i></div>
                <p class="font-semibold text-gray-700">Drive Pack</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center service-card border border-gray-100">
                <div class="text-green-500 text-3xl mb-2"><i class="fa-solid fa-gamepad"></i></div>
                <p class="font-semibold text-gray-700">Game Topup</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm text-center service-card border border-gray-100">
                <div class="text-purple-600 text-3xl mb-2"><i class="fa-solid fa-receipt"></i></div>
                <p class="font-semibold text-gray-700">Bill Pay</p>
            </div>
        </div>

        <div class="mt-10">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-bold text-gray-800">Hot Offers (Drive Packs)</h3>
                <a href="#" class="text-blue-600 text-sm font-semibold">View All</a>
            </div>
            
            <div class="space-y-3">
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-blue-600">
                    <div>
                        <h4 class="font-bold text-gray-800">GP 40GB + 800 Min</h4>
                        <p class="text-xs text-gray-500">Validity: 30 Days</p>
                    </div>
                    <div class="text-right">
                        <p class="text-blue-600 font-bold text-lg">৳ 499</p>
                        <button class="bg-blue-100 text-blue-600 px-3 py-1 rounded text-xs font-bold mt-1">Buy Now</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center border-l-4 border-red-500">
                    <div>
                        <h4 class="font-bold text-gray-800">Robi 50GB Internet</h4>
                        <p class="text-xs text-gray-500">Validity: 30 Days</p>
                    </div>
                    <div class="text-right">
                        <p class="text-red-500 font-bold text-lg">৳ 380</p>
                        <button class="bg-red-50 text-red-500 px-3 py-1 rounded text-xs font-bold mt-1">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-3">
        <div class="text-blue-600 flex flex-col items-center">
            <i class="fa-solid fa-house"></i>
            <span class="text-[10px]">Home</span>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-list"></i>
            <span class="text-[10px]">Orders</span>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-wallet"></i>
            <span class="text-[10px]">Wallet</span>
        </div>
        <div class="text-gray-400 flex flex-col items-center">
            <i class="fa-solid fa-headset"></i>
            <span class="text-[10px]">Support</span>
        </div>
    </div>

    <div class="h-20"></div> </body>
</html>
