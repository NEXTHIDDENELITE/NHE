<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHE DASHBOARD - ON</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff003c; --neon-blue: #00f2ff; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 50% 50%, #111, #000); }
        .card { width: 450px; background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-top: 4px solid #00ff88; border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8); }
        .server-status { color: #00ff88; font-family: 'Orbitron'; font-size: 12px; letter-spacing: 3px; margin-bottom: 10px; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; letter-spacing: 5px; color: var(--neon-red); margin-bottom: 30px; text-shadow: 0 0 10px var(--neon-red); }
        input { width: 100%; background: #000; border: 1px solid #444; padding: 15px; color: var(--neon-blue); font-family: 'Orbitron', sans-serif; margin-bottom: 20px; border-radius: 8px; outline: none; }
        .btn { width: 100%; padding: 18px; background: var(--neon-red); color: #fff; font-family: 'Orbitron', sans-serif; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; letter-spacing: 2px; }
        #pending, #success { display: none; }
        .spinner { width: 50px; height: 50px; border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--neon-blue); border-radius: 50%; margin: 0 auto 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div class="server-status">● NHE SERVER ON</div>
        <div id="main">
            <h1>DASHBOARD</h1>
            <input type="text" id="name" placeholder="GAME ID NAME">
            <input type="number" id="uid" placeholder="TARGET UID">
            <button class="btn" onclick="start()">SUBMIT DATA</button>
        </div>
        <div id="pending">
            <div class="spinner"></div>
            <h2 style="color: var(--neon-blue); font-family: 'Orbitron';">PENDING...</h2>
        </div>
        <div id="success">
            <h1 style="color: #00ff88;">SUCCESSFUL</h1>
            <div id="res" style="background:rgba(0,255,136,0.1); padding:15px; border-radius:10px; text-align:left; color:#00ff88; margin:20px 0;"></div>
            <button class="btn" style="background:#222;" onclick="location.reload()">BACK</button>
        </div>
    </div>
    <script>
        function start() {
            const n = document.getElementById("name").value;
            const u = document.getElementById("uid").value;
            if(!n || !u) return alert("Fill all fields!");
            document.getElementById("main").style.display = "none";
            document.getElementById("pending").style.display = "block";
            setTimeout(() => {
                document.getElementById("pending").style.display = "none";
                document.getElementById("success").style.display = "block";
                document.getElementById("res").innerHTML = "NAME: "+n+"<br>UID: "+u+"<br>STATUS: BYPASSED";
            }, 10000);
        }
    </script>
</body>
</html>
