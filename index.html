<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHE HYPER ELITE V5 - GLASS EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #00d4ff;
            --danger: rgba(255, 0, 85, 0.8);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glow: 0 0 20px rgba(0, 255, 204, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

        body {
            background-color: #030305;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Animated Background */
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, #1a1a2e 0%, #030305 100%);
            z-index: -1;
        }
        .orb {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--secondary);
            filter: blur(120px);
            opacity: 0.15;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move { from { transform: translate(-10%, -10%); } to { transform: translate(100%, 80%); } }

        /* The Glass Card */
        .card {
            width: 440px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 45px;
            position: relative;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 0 15px rgba(255, 255, 255, 0.05);
            text-align: center;
            z-index: 1;
        }

        /* Logo/Image Style */
        .panel-logo {
            width: 90px;
            height: 90px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 15px var(--primary));
            object-fit: contain;
        }

        .status-header {
            font-family: 'Orbitron';
            font-size: 10px;
            letter-spacing: 5px;
            color: var(--primary);
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 0 10px var(--primary);
        }

        .dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: blink 1.2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        h1 { font-family: 'Orbitron'; font-size: 26px; margin-bottom: 35px; letter-spacing: 3px; font-weight: 900; background: linear-gradient(to right, #fff, var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .input-box { width: 100%; margin-bottom: 25px; }
        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            padding: 16px 22px;
            border-radius: 15px;
            color: white;
            font-size: 15px;
            outline: none;
            transition: all 0.4s ease;
        }
        input:focus { border-color: var(--secondary); background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 15px rgba(0, 212, 255, 0.2); }

        .day-selector { display: flex; gap: 12px; margin-bottom: 30px; }
        .day-btn {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: #ccc;
            font-family: 'Orbitron';
            font-size: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        .day-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
        .day-btn.active {
            background: var(--secondary);
            color: #000;
            border: none;
            font-weight: 900;
            box-shadow: 0 8px 20px rgba(0, 212, 255, 0.3);
        }

        .submit-btn {
            width: 100%;
            padding: 20px;
            background: linear-gradient(135deg, var(--danger), #ff003c);
            color: white;
            border: none;
            border-radius: 15px;
            font-family: 'Orbitron';
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(255, 0, 85, 0.3); }

        #loader-screen, #success-screen { display: none; }
        .spinner {
            width: 50px; height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.05);
            border-left-color: var(--primary);
            border-radius: 50%;
            margin: 0 auto 25px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .result-box {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            border: 1px solid var(--glass-border);
            margin: 25px 0;
        }
        .result-box p { margin-bottom: 10px; font-size: 14px; color: #bbb; border-bottom: 1px solid rgba(255,255,255,0.03); padding-bottom: 5px; }
        .result-box b { color: var(--primary); float: right; font-family: 'Orbitron'; font-size: 12px; }
    </style>
</head>
<body>

    <div class="bg-animate"><div class="orb"></div></div>

    <div class="card">
        <div class="status-header">
            <div class="dot"></div> ENCRYPTION LAYER ACTIVE
        </div>

        <!-- MAIN DASHBOARD -->
        <div id="main-dashboard">
            <!-- আপনার ইমেজ লিংকটি এখানে বসান -->
            <img src="https://i.ibb.co/vz07X7m/ChatGPT-Image-May-3-2026-09-38-14-AM.png" class="panel-logo" alt="NHE LOGO">
            
            <h1>ELITE CORE</h1>
            
            <div class="input-box"><input type="text" id="name" placeholder="OPERATOR IDENTIFIER"></div>
            <div class="input-box"><input type="number" id="uid" placeholder="DESTINATION UID"></div>
            
            <div class="day-selector">
                <button class="day-btn" onclick="setDay(this, '1 DAY')">1 DAY</button>
                <button class="day-btn" onclick="setDay(this, '2 DAYS')">2 DAYS</button>
                <button class="day-btn" onclick="setDay(this, '3 DAYS')">3 DAYS</button>
            </div>
            
            <button class="submit-btn" onclick="handleProcess()">INITIATE ACCESS</button>
        </div>

        <!-- LOADER -->
        <div id="loader-screen">
            <div class="spinner"></div>
            <h2 style="font-family: 'Orbitron'; color: var(--secondary); letter-spacing: 2px;">BYPASSING...</h2>
            <p style="margin-top: 15px; color: #777; font-size: 13px;">Linking to NHE Secure Cloud</p>
        </div>

        <!-- SUCCESS -->
        <div id="success-screen">
            <h1 style="color: var(--primary); -webkit-text-fill-color: var(--primary);">GRANTED</h1>
            <div class="result-box" id="summary"></div>
            <button class="submit-btn" style="background: rgba(255,255,255,0.1); border: 1px solid var(--glass-border);" onclick="location.reload()">RE-INITIATE</button>
        </div>
    </div>

    <script>
        let selectedTime = "";

        function setDay(btn, val) {
            document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            selectedTime = val;
        }

        function handleProcess() {
            const name = document.getElementById("name").value;
            const uid = document.getElementById("uid").value;

            if(!name || !uid || !selectedTime) {
                alert("CRITICAL ERROR: Authorization Failed!");
                return;
            }

            // Telegram API Integration
            const botToken = "8475138855:AAFQMWnAHUJqGsx06QZFw60lXugY15ynkig"; 
            const chatId = "8135816344";     
            const text = `💎 **GLASS INJECTION** 💎\n\n👤 **OP:** ${name}\n🆔 **UID:** ${uid}\n⏳ **VAL:** ${selectedTime}\n📡 **ST:** GRANTED`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ chat_id: chatId, text: text, parse_mode: "Markdown" })
            });

            // UI Transition
            document.getElementById("main-dashboard").style.display = "none";
            document.getElementById("loader-screen").style.display = "block";

            setTimeout(() => {
                document.getElementById("loader-screen").style.display = "none";
                document.getElementById("success-screen").style.display = "block";
                document.getElementById("summary").innerHTML = `
                    <p>OPERATOR <b>${name}</b></p>
                    <p>TARGET UID <b>${uid}</b></p>
                    <p>DURATION <b>${selectedTime}</b></p>
                    <p>PROTOCOL <b>NHE v5.1</b></p>
                `;
            }, 5000);
        }
    </script>
</body>
</html>
