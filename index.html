<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHE PREMIUM BYPASS - V2</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Consolas', 'Courier New', monospace;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: #000;
    overflow:hidden;
    color:white;
}

/* ⚡ Dynamic Scanner Light */
body::after {
    content: "";
    position: absolute;
    width: 100%;
    height: 150px;
    background: linear-gradient(0deg, transparent, rgba(255, 0, 0, 0.2), transparent);
    bottom: -150px;
    left: 0;
    animation: scanner 4s infinite ease-in-out;
}

@keyframes scanner {
    0% { bottom: -150px; }
    50% { bottom: 100%; }
    100% { bottom: -150px; }
}

/* Background Glow */
.bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    background:radial-gradient(circle,#ff000022,transparent 70%);
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    filter:blur(80px);
}

/* Main Container */
.container{
    width:420px;
    padding:35px;
    border-radius:25px;
    background:rgba(255,255,255,0.03);
    backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 50px rgba(255,0,0,0.15), inset 0 0 20px rgba(255,255,255,0.05);
    text-align:center;
    position: relative;
    z-index: 10;
    border-top: 1px solid rgba(255,255,255,0.2);
}

/* Status Box - Initial Style */
.status{
    position:fixed;
    top:20px;
    padding:8px 20px;
    border-radius:30px;
    font-size:12px;
    font-weight:bold;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    z-index: 1000;
}

.on { color: #00ffa6; box-shadow: 0 0 15px #00ffa655; }

/* 🔴 Offline Shake Animation & Red BG */
.offline-active {
    background: #ff0000 !important;
    color: #fff !important;
    border: 1px solid #ffffff;
    box-shadow: 0 0 25px #ff0000;
    animation: shake 0.4s ease-in-out;
}

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-8px); }
    50% { transform: translateX(8px); }
    75% { transform: translateX(-8px); }
}

input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.4);
    color:#00ffaa;
    margin-bottom: 15px;
    outline:none;
    text-align: center;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background: linear-gradient(45deg, #8b0000, #ff0000);
    color:white;
    cursor:pointer;
    font-weight:bold;
    text-transform: uppercase;
}

</style>
</head>
<body>

<div class="bg-glow"></div>
<div id="statusBox" class="status on" style="display:none;">● BYPASS SERVER ONLINE</div>

<div class="container">
    
    <div id="loginSection">
        <h2 style="font-size: 20px; color: #ff3b3b; margin-bottom: 25px;">NHE Admin Access</h2>
        <input type="text" id="user" placeholder="USERNAME">
        <input type="password" id="pass" placeholder="PASSWORD">
        <button onclick="handleLogin()">Authorize</button>
    </div>

    <div id="toolSection" style="display:none;">
        <h2 style="color: #00ffa6;">UID BYPASS PRO</h2>
        <p style="font-size: 11px; color: #888; margin-bottom: 15px;">SERVER OFFLINE</p>
        <input type="text" id="uidInput" placeholder="ENTER PLAYER UID">
        <button onclick="startBypass()">Execute Trial</button>
    </div>

</div>

<script>
function handleLogin() {
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if(user === "free" && pass === "nhe") {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("toolSection").style.display = "block";
        document.getElementById("statusBox").style.display = "block";
    } else {
        alert("ACCESS DENIED: WRONG CREDENTIALS");
    }
}

function startBypass() {
    let uid = document.getElementById("uidInput").value.trim();
    if(uid === "") return alert("UID Required!");

    const statusBox = document.getElementById("statusBox");

    // Change status to Offline with Red Background and Shake
    statusBox.innerHTML = "● BYPASS SERVER OFFLINE";
    statusBox.classList.remove("on");
    statusBox.classList.add("offline-active");

    // Remove shake class after animation so it can shake again on next click
    setTimeout(() => {
        statusBox.classList.remove("offline-active");
        // Keep the red background and offline text
        statusBox.style.background = "#ff0000";
        statusBox.style.color = "#fff";
        statusBox.style.boxShadow = "0 0 20px red";
    }, 400);
}
</script>

</body>
</html>
