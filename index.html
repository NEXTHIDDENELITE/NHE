<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NHE DASHBOARD - OFF</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { --neon-red: #ff003c; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }
        body { background: var(--bg); color: #fff; height: 100vh; display: flex; justify-content: center; align-items: center; background-image: radial-gradient(circle at 50% 50%, #111, #000); }
        .card { width: 450px; background: rgba(15, 15, 15, 0.9); border: 1px solid #333; border-top: 4px solid var(--neon-red); border-radius: 15px; padding: 40px; text-align: center; }
        
        /* কাঁপানো এনিমেশন (Shake Animation) */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
        .error-msg { color: var(--neon-red); font-family: 'Orbitron'; font-size: 14px; letter-spacing: 2px; margin-bottom: 10px; display: none; }
        .shake-active { display: block; animation: shake 0.2s ease-in-out infinite; }

        .server-status { color: var(--neon-red); font-family: 'Orbitron'; font-size: 12px; letter-spacing: 3px; margin-bottom: 10px; opacity: 0.6; }
        h1 { font-family: 'Orbitron', sans-serif; font-size: 28px; letter-spacing: 5px; color: #444; margin-bottom: 30px; }
        input { width: 100%; background: #111; border: 1px solid #222; padding: 15px; color: #444; font-family: 'Orbitron', sans-serif; margin-bottom: 20px; border-radius: 8px; outline: none; cursor: not-allowed; }
        .btn { width: 100%; padding: 18px; background: #222; color: #555; font-family: 'Orbitron', sans-serif; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <div id="statusText" class="server-status">● NHE SERVER OFF</div>
        <div id="errorAlert" class="error-msg">UID BYPASS SERVER OFF!</div>
        <h1>DASHBOARD</h1>
        <input type="text" placeholder="SERVER DOWN" disabled>
        <input type="number" placeholder="MAINTENANCE" disabled>
        <button class="btn" onclick="showError()">SUBMIT DATA</button>
    </div>
    <script>
        function showError() {
            const alert = document.getElementById("errorAlert");
            const status = document.getElementById("statusText");
            alert.classList.add("shake-active");
            status.style.opacity = "1";
            setTimeout(() => {
                alert.classList.remove("shake-active");
            }, 3000); // ৩ সেকেন্ড পর কাঁপাকাঁপি বন্ধ হবে
        }
    </script>
</body>
</html>
